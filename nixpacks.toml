[phases.setup]
nixPkgs = ["php", "phpExtensions.pdo_mysql", "phpExtensions.mbstring", "phpExtensions.xml", "phpExtensions.curl", "phpExtensions.tokenizer", "phpExtensions.ctype", "phpExtensions.fileinfo"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force && php -S 0.0.0.0:$PORT -t public/"
